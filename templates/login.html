{% extends 'layout.html' %}

{% block header_admin_zone %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-5 text-center">
                
                <h4 class="card-title mb-4" style="color: #094672; font-weight: 700;">Acceso para Voluntarios</h4>
                
                <form action="/login" method="POST">
                    <div class="mb-4">
                        <input type="password" name="clave" class="form-control form-control-lg text-center shadow-sm" placeholder="Ingresar clave..." required style="border: 1px solid #094672; border-radius: 8px; background-color: #f8fbff;">
                    </div>
                    
                    <button type="submit" class="btn w-100 mb-4 shadow-sm" style="background-color: #094672; color: white; border-radius: 8px; font-weight: bold; padding: 10px; font-size: 16px; transition: all 0.2s;">
                        Desbloquear Funciones
                    </button>
                </form>
                
                <a href="/" style="color: #094672; text-decoration: none; font-weight: bold; font-size: 15px; transition: all 0.2s;">
                    <i class="bi bi-arrow-left-circle me-1"></i> Volver al catálogo
                </a>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
