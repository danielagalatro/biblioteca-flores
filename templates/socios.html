{% extends 'layout.html' %}

{% block content %}
<div class="row">
    
    <div class="col-md-4 mb-4 mb-md-0">
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body">
                <h5 class="card-title mb-4">Registrar Nuevo Socio</h5>
                <form action="/guardar_socio" method="POST">
                    <div class="mb-3">
                        <label class="form-label" style="color: #094672; font-weight: 600;">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control" required style="border-radius: 8px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color: #094672; font-weight: 600;">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" required style="border-radius: 8px;">
                    </div>
                    <button type="submit" class="btn btn-info w-100">Registrar Socio</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-body p-4">
                
                <h4 class="mb-4" style="color: #094672; font-weight: bold;">Listado de Socios</h4>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark" style="background-color: #094672 !important;">
                            <tr>
                                <th class="text-center">ID Socio</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for socio in socios %}
                            <tr>
                                <td class="text-center">
                                    <span style="color: #094672; font-weight: bold; font-family: monospace; font-size: 15px;">
                                        {{ "%04d" | format(socio[0]) }}
                                    </span>
                                </td>
                                <td>{{ socio[1] }}</td>
                                <td>{{ socio[2] }}</td>
                                <td class="text-center">
                                    <div class="d-flex justify-content-center align-items-center gap-3">
                                        <a href="/editar_socio/{{ socio[0] }}" title="Editar datos" style="color: #094672; text-decoration: none; font-size: 1.2rem;">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        <a href="/historial_socio/{{ socio[0] }}" title="Ver historial" style="color: #094672; text-decoration: none; font-size: 1.2rem;">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">No hay socios registrados todavía.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
</div>
{% endblock %}
