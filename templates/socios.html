<!DOCTYPE html>
<html lang="es">
<style>
    /* El Azul de la barra de arriba */
    .bg-dark { background-color: #002d5a !important; } 
    
    /* El Rojo para botones principales */
    .btn-primary, .btn-danger { 
        background-color: #c0142c !important; 
        border-color: #a01226 !important; 
    }
    
    /* El Celeste/Info para los MFN (que combina con el azul) */
    .bg-info { background-color: #00aae4 !important; color: white !important; }

    /* Ajuste para que el texto de la barra se vea bien */
    .navbar-dark .nav-link { color: rgba(255,255,255,.8) !important; }
    .navbar-dark .nav-link.active { color: #fff !important; font-weight: bold; }

    /* Color de los títulos */
    h1, h2, .card-title { color: #002d5a; }
</style>
<head>
    <meta charset="UTF-8">
    <title>Socios - Biblioteca Cacho El Kadri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Catálogo de Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/socios">Gestión de Socios</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex align-items-center mb-4 p-3 bg-white rounded shadow-sm">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="me-3" style="height: 60px; width: auto;">
            <h1 class="h2 m-0" style="color: #2c3e50; font-weight: 700;">Biblioteca Cacho El Kadri</h1>
        </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Registrar Nuevo Socio</h5>
                        <form action="/guardar_socio" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" name="telefono" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-info w-100">Registrar Socio</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Listado de Socios</h5>
                        <table class="table table-striped mt-3">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID Socio</th>
                                    <th>Nombre</th>
                                    <th>Teléfono</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for socio in socios %}
                                <tr>
                                    <td><span class="badge bg-info text-dark">{{ "%04d" | format(socio[0]) }}</span></td>
                                    <td>{{ socio[1] }}</td>
                                    <td>{{ socio[2] }}</td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="3" class="text-center">No hay socios registrados.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
