<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset=<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prestar Libro - Cacho El Kadri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. Fondo general tenue (Gris azulado) */
        body { background-color: #f4f7f9 !important; }

        /* 2. Encabezado de la tarjeta: Azul San Lorenzo con línea roja */
        .card-header.bg-primary { 
            background-color: #094672 !important; 
            border-bottom: 4px solid #88091a; 
        }

        /* 3. --- BOTONES TENUES SIN BORDE OSCURO --- */
        
        /* Botón Confirmar (Azul Tenue) */
        .btn-success {
            background-color: #d1e3f0 !important; 
            color: #094672 !important; 
            border: 1px solid transparent !important; /* Borde invisible */
            border-radius: 8px !important;
            font-weight: bold !important;
            font-size: 15px !important;       
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: #b9d8ed !important;
            color: #094672 !important;
        }

        /* Botón Cancelar (Rojo Tenue, igual que la acción de Borrar) */
        .btn-outline-secondary { 
            background-color: #fbe9eb !important; 
            color: #88091a !important; 
            border: 1px solid transparent !important; /* Borde invisible */
            border-radius: 8px !important;
            font-weight: bold !important;
            font-size: 15px !important;       
            transition: all 0.2s;
        }
        .btn-outline-secondary:hover {
            background-color: #f8d7da !important;
            color: #88091a !important;
        }

        /* 4. Estilizar la caja de información para que no desentone */
        .alert-info {
            background-color: white !important;
            border: 1px solid #d1e3f0 !important;
            color: #333 !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 550px; border: none; border-radius: 12px; overflow: hidden;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0 font-weight-bold">Registrar Préstamo</h4>
            </div>
            <div class="card-body p-4">
                
                <div class="alert alert-info">
                    <strong>Libro:</strong> <span style="color: #094672; font-weight: bold;">{{ libro[0] }}</span> <br>
                    <strong>Nro. Inventario:</strong> <span style="color: #094672; font-weight: bold; font-family: monospace; font-size: 15px;">{{ libro[1] }}</span>
                </div>

                <form action="/registrar_prestamo" method="POST">
                    <input type="hidden" name="nro_inventario" value="{{ libro[1] }}">
                    
                    <div class="mb-4">
                        <label class="form-label font-weight-bold" style="color: #094672;">Buscar Socio por Nombre:</label>
                        <input class="form-control form-control-lg" list="lista-socios" id="socio-buscador" placeholder="Escribí el nombre del socio..." required style="border: 1px solid #094672; border-radius: 8px;">
                        <input type="hidden" name="id_socio" id="id-socio-final">
                        
                        <datalist id="lista-socios">
                            {% for socio in socios %}
                            <option data-id="{{ socio[0] }}" value="{{ socio[1] }}">Socio #{{ "%04d" | format(socio[0]) }}</option>
                            {% endfor %}
                        </datalist>
                        <small class="text-muted mt-2 d-block"></small>
                    </div>

                    <div class="d-grid gap-2">
                        <div class="mb-4">
    <label class="form-label font-weight-bold" style="color: #094672;">Fecha del Préstamo:</label>
    <input type="date" name="fecha_prestamo" class="form-control form-control-lg" value="{{ hoy_iso }}" style="border: 1px solid #094672; border-radius: 8px;">
    <small class="text-muted mt-2 d-block">Por defecto es la fecha de hoy.</small>
</div>
                        <button type="submit" class="btn btn-success btn-lg">Confirmar Entrega</button>
                        <a href="/" class="btn btn-outline-secondary btn-lg text-center">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('socio-buscador').addEventListener('input', function(e) {
            var input = e.target;
            var list = document.getElementById('lista-socios');
            var options = list.options;
            for (var i = 0; i < options.length; i++) {
                if (options[i].value === input.value) {
                    document.getElementById('id-socio-final').value = options[i].getAttribute('data-id');
                    break;
                }
            }
        });
    </script>
</body>
</html>
