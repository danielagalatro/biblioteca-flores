{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-md-8 col-lg-6">
        
        <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
            <div class="card-header text-white text-center py-3" style="background-color: #094672; border-bottom: 4px solid #88091a;">
                <h4 class="mb-0 font-weight-bold">Registrar Préstamo</h4>
            </div>
            
            <div class="card-body p-4">
                
                <div class="mb-4 p-3 bg-white border rounded-3" style="border-color: #d1e3f0 !important;">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <i class="bi bi-journal-bookmark-fill" style="font-size: 2rem; color: #094672;"></i>
                        </div>
                        <div class="col">
                            <p class="mb-0 small text-muted">Libro seleccionado:</p>
                            <h5 class="mb-0" style="color: #094672; font-weight: bold;">{{ libro[0] }}</h5>
                            <p class="mb-0 text-muted small">Inventario: <span style="font-family: monospace; font-weight: bold;">{{ libro[1] }}</span></p>
                        </div>
                    </div>
                </div>

                <form action="/registrar_prestamo" method="POST">
                    <input type="hidden" name="nro_inventario" value="{{ libro[1] }}">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #094672;">Buscar Socio por Nombre:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white" style="border: 1px solid #094672; border-right: none;">
                                <i class="bi bi-person-search" style="color: #094672;"></i>
                            </span>
                            <input class="form-control form-control-lg" list="lista-socios" id="socio-buscador" placeholder="Escribí el nombre..." required style="border: 1px solid #094672; border-left: none; border-radius: 0 8px 8px 0;">
                        </div>
                        <input type="hidden" name="id_socio" id="id-socio-final">
                        
                        <datalist id="lista-socios">
                            {% for socio in socios %}
                            <option data-id="{{ socio[0] }}" value="{{ socio[1] }}">Socio #{{ "%04d" | format(socio[0]) }}</option>
                            {% endfor %}
                        </datalist>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #094672;">Fecha del Préstamo:</label>
                        <input type="date" name="fecha_prestamo" class="form-control form-control-lg" value="{{ hoy_iso }}" style="border: 1px solid #094672; border-radius: 8px;">
                        <small class="text-muted mt-2 d-block">Por defecto es la fecha de hoy.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg py-2">
                            <i class="bi bi-clipboard-check me-2"></i>Confirmar Entrega
                        </button>
                        <a href="/" class="btn btn-primary btn-lg py-2">
                            <i class="bi bi-arrow-left-circle me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>

<script>
    document.getElementById('socio-buscador').addEventListener('input', function(e) {
        var input = e.target;
        var list = document.getElementById('lista-socios');
        var options = list.options;
        for (var i = 0; i < options.length; i++) {
            if (options[i].value === input.value) {
                document.getElementById('id-socio-final').value = options[i].getAttribute('data-id');
                break;
            }
        }
    });
</script>
{% endblock %}
