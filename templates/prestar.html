<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prestar Libro - Cacho El Kadri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow mx-auto" style="max-width: 550px;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Registrar Préstamo</h4>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info">
                    <strong>Libro:</strong> {{ libro[0] }} <br>
                    <strong>Nro. Inventario:</strong> {{ libro[1] }}
                </div>

                <form action="/registrar_prestamo" method="POST">
                    <input type="hidden" name="nro_inventario" value="{{ libro[1] }}">
                    
                    <div class="mb-4">
                        <label class="form-label font-weight-bold">Buscar Socio por Nombre:</label>
                        <input class="form-control form-control-lg" list="lista-socios" id="socio-buscador" placeholder="Escribí el nombre del socio..." required>
                        <input type="hidden" name="id_socio" id="id-socio-final">
                        
                        <datalist id="lista-socios">
                            {% for socio in socios %}
                            <option data-id="{{ socio[0] }}" value="{{ socio[1] }}">Socio #{{ "%04d" | format(socio[0]) }}</option>
                            {% endfor %}
                        </datalist>
                        <small class="text-muted">Seleccioná el nombre de la lista desplegable.</small>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Confirmar Entrega</button>
                        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('socio-buscador').addEventListener('input', function(e) {
            var input = e.target;
            var list = document.getElementById('lista-socios');
            var options = list.options;
            for (var i = 0; i < options.length; i++) {
                if (options[i].value === input.value) {
                    document.getElementById('id-socio-final').value = options[i].getAttribute('data-id');
                    break;
                }
            }
        });
    </script>
</body>
</html>
