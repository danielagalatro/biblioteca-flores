{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-md-6 col-lg-5">
        
        <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
            <div class="card-header text-white text-center py-3" style="background-color: #094672; border-bottom: 4px solid #88091a;">
                <h4 class="mb-0 font-weight-bold">Editar Socio</h4>
            </div>
            
            <div class="card-body p-4">
                
                <form action="/actualizar_socio" method="POST">
                    <input type="hidden" name="id_socio" value="{{ socio[0] }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #094672;">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control" value="{{ socio[1] }}" required style="border: 1px solid #d1e3f0; border-radius: 8px;">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #094672;">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ socio[2] }}" style="border: 1px solid #d1e3f0; border-radius: 8px;">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg py-2">
                            <i class="bi bi-person-check-fill me-2"></i>Guardar Cambios
                        </button>
                        <a href="/socios" class="btn btn-primary btn-lg py-2">
                            <i class="bi bi-x-circle me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
                
            </div>
        </div>

        <p class="text-center mt-3 text-muted small">
            <i class="bi bi-fingerprint me-1"></i> ID de Socio Interno: <span style="font-family: monospace; font-weight: bold; color: #094672;">{{ "%04d" | format(socio[0]) }}</span>
        </p>

    </div>
</div>
{% endblock %}
