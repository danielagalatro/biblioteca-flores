<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Libro - Flores Solidario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded shadow-sm">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo Flores Solidario" class="me-3" style="height: 60px; width: auto;">
                <h1 class="h2 m-0" style="color: #2c3e50; font-weight: 700;">Biblioteca Cacho el Kadri</h1>
            </div>
            
            <div>
                {% if session.get('admin') %}
                    <span class="badge bg-warning text-dark me-2">Modo Edición Activado</span>
                    <a href="/logout" class="btn btn-outline-secondary btn-sm">Cerrar Sesión</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-warning btn-sm">Desbloquear Edición</a>
                {% endif %}
            </div>
        </div>

        <div class="card shadow mx-auto" style="max-width: 650px;">
            <div class="card-body">
                <h2 class="card-title h4 mb-4 text-center">Ingresar Nuevo Libro</h2>
                
                {% if error %}
                <div class="alert alert-danger fw-bold" role="alert">
                    {{ error }}
                </div>
                {% endif %}
                
                <form action="/guardar" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Nro. Inventario *</label>
                        <input type="number" name="nro_inventario" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Título *</label>
                        <input type="text" name="titulo" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Autor *</label>
                        <input type="text" name="autor" class="form-control" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Editorial</label>
                            <input type="text" name="editorial" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Año</label>
                            <input type="number" name="anio" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Signatura Topográfica *</label>
                        <input type="text" name="signatura" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Observaciones</label>
                        <textarea name="observaciones" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Guardar Libro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
