<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Libro - Flores Solidario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4" style="color: #2c3e50;">Biblioteca Flores Solidario</h1>
        
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h5 class="card-title mb-4">Editar Libro</h5>
                
                <form action="/actualizar/{{ libro[0] }}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Nro. Inventario</label>
                        <input type="number" name="nro_inventario" class="form-control bg-light" value="{{ libro[0] }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Título *</label>
                        <input type="text" name="titulo" class="form-control" value="{{ libro[1] }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Autor *</label>
                        <input type="text" name="autor" class="form-control" value="{{ libro[2] }}" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Editorial</label>
                            <input type="text" name="editorial" class="form-control" value="{{ libro[3] if libro[3] else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Año</label>
                            <input type="number" name="anio" class="form-control" value="{{ libro[4] if libro[4] else '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Signatura Topográfica *</label>
                        <input type="text" name="signatura" class="form-control" value="{{ libro[5] }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Observaciones</label>
                        <textarea name="observaciones" class="form-control" rows="2">{{ libro[6] if libro[6] else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Actualizar Libro</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
