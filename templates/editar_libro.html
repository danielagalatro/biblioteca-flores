{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-md-8 col-lg-6">
        
        <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
            <div class="card-header text-white text-center py-3" style="background-color: #094672; border-bottom: 4px solid #88091a;">
                <h4 class="mb-0 font-weight-bold">Editar Libro</h4>
            </div>
            
            <div class="card-body p-4">
                
                <div class="text-end mb-4">
                    <a href="/historial_libro/{{ libro[0] }}" class="btn btn-outline-info shadow-sm px-3 py-2" style="border-radius: 20px !important; font-size: 13px;">
                        <i class="bi bi-clock-history me-1"></i> Ver historial de préstamos
                    </a>
                </div>
                
                <form action="/actualizar/{{ libro[0] }}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nro. Inventario</label>
                        <input type="number" name="nro_inventario" class="form-control bg-light" value="{{ libro[0] }}" readonly style="color: #094672; font-family: monospace; font-size: 16px; font-weight: bold; border: 1px solid #d1e3f0;">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título *</label>
                        <input type="text" name="titulo" class="form-control" value="{{ libro[1] }}" required style="border: 1px solid #d1e3f0; border-radius: 8px;">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Autor *</label>
                        <input type="text" name="autor" class="form-control" value="{{ libro[2] }}" required style="border: 1px solid #d1e3f0; border-radius: 8px;">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Editorial</label>
                            <input type="text" name="editorial" class="form-control" value="{{ libro[3] if libro[3] else '' }}" style="border: 1px solid #d1e3f0; border-radius: 8px;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Año</label>
                            <input type="number" name="anio" class="form-control" value="{{ libro[4] if libro[4] else '' }}" style="border: 1px solid #d1e3f0; border-radius: 8px;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Signatura Topográfica *</label>
                        <input type="text" name="signatura" class="form-control" value="{{ libro[5] }}" required style="border: 1px solid #d1e3f0; border-radius: 8px;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Observaciones</label>
                        <textarea name="observaciones" class="form-control" rows="2" style="border: 1px solid #d1e3f0; border-radius: 8px;">{{ libro[6] if libro[6] else '' }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg py-2">
                            <i class="bi bi-check-circle me-2"></i>Actualizar Libro
                        </button>
                        <a href="/" class="btn btn-primary btn-lg py-2">
                            <i class="bi bi-x-circle me-2"></i>Cancelar
                        </a>
                    </div>
                    
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
